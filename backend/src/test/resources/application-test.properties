# Test profile: use in-memory H2 so `mvn test/package` doesn't require external DB env vars
spring.datasource.url=jdbc:h2:mem:smartfinancemanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Avoid trying to initialize from external SQL scripts unless you add them
spring.sql.init.mode=never

# Reduce noise in tests
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
